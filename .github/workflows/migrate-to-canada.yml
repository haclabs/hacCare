# One-time migration workflow: US East → Canada (ca-central-1)
# Trigger manually from GitHub Actions tab → "Run workflow"
# DELETE THIS FILE after migration is complete.
#
# Uses pg_dump/psql with Supabase connection POOLER URLs (IPv4) for both source and target.
# No Supabase CLI needed — avoids IPv6 direct DB connection issues in GitHub Actions.
#
# Required GitHub Secrets:
#   OLD_DB_REF          = cwhqffubvqolhnkecyck  (just the project ref, no URL)
#   OLD_DB_PASSWORD     = old project DB password
#   OLD_DB_POOLER_HOST  = find in: Supabase Dashboard → old project → Settings → Database → Connection Pooling
#                         e.g. aws-0-us-east-2.pooler.supabase.com
#   NEW_DB_REF          = your Canada project ref (e.g. abcdefghijklmnop)
#   NEW_DB_PASSWORD     = new Canada project DB password
#
# New Canada pooler host is hardcoded: aws-1-ca-central-1.pooler.supabase.com

name: Migrate Supabase US → Canada

on:
  workflow_dispatch:   # Manual trigger only — never runs automatically

permissions:
  contents: read

jobs:
  migrate:
    name: Dump and Restore
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo (for migration SQL files)
        uses: actions/checkout@v6

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Dump public data only via pooler (IPv4 — no IPv6 issues)
        env:
          PGPASSWORD: ${{ secrets.OLD_DB_PASSWORD }}
          OLD_POOLER_URL: postgresql://postgres.${{ secrets.OLD_DB_REF }}:${{ secrets.OLD_DB_PASSWORD }}@aws-0-us-east-2.pooler.supabase.com:5432/postgres?sslmode=require
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "$OLD_POOLER_URL" \
            --schema public \
            --data-only \
            --no-owner \
            --no-acl \
            --file haccare_public.sql
          echo "Public dump size: $(du -sh haccare_public.sql | cut -f1)"

      - name: Dump auth users via pooler (data only)
        env:
          PGPASSWORD: ${{ secrets.OLD_DB_PASSWORD }}
          OLD_POOLER_URL: postgresql://postgres.${{ secrets.OLD_DB_REF }}:${{ secrets.OLD_DB_PASSWORD }}@aws-0-us-east-2.pooler.supabase.com:5432/postgres?sslmode=require
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "$OLD_POOLER_URL" \
            --schema auth \
            --data-only \
            --no-owner \
            --no-acl \
            --file haccare_auth.sql
          echo "Auth dump size: $(du -sh haccare_auth.sql | cut -f1)"

      - name: Restore auth users FIRST (must exist before public FK references)
        env:
          PGPASSWORD: ${{ secrets.NEW_DB_PASSWORD }}
          NEW_POOLER_URL: postgresql://postgres.${{ secrets.NEW_DB_REF }}:${{ secrets.NEW_DB_PASSWORD }}@aws-1-ca-central-1.pooler.supabase.com:5432/postgres?sslmode=require
        run: |
          psql "$NEW_POOLER_URL" -c "TRUNCATE auth.identities CASCADE; TRUNCATE auth.users CASCADE;"
          psql "$NEW_POOLER_URL" --file=haccare_auth.sql
          echo "Auth user restore complete"

      - name: Truncate all public tables (clean slate before restore)
        env:
          PGPASSWORD: ${{ secrets.NEW_DB_PASSWORD }}
          NEW_POOLER_URL: postgresql://postgres.${{ secrets.NEW_DB_REF }}:${{ secrets.NEW_DB_PASSWORD }}@aws-1-ca-central-1.pooler.supabase.com:5432/postgres?sslmode=require
        run: |
          psql "$NEW_POOLER_URL" <<'SQL'
            DO $$
            DECLARE r RECORD;
            BEGIN
              FOR r IN SELECT tablename FROM pg_tables WHERE schemaname = 'public' LOOP
                EXECUTE 'TRUNCATE TABLE public.' || quote_ident(r.tablename) || ' CASCADE';
              END LOOP;
            END $$;
          SQL
          echo "Public tables truncated"

      - name: Restore public data to Canada project (FK triggers disabled)
        env:
          PGPASSWORD: ${{ secrets.NEW_DB_PASSWORD }}
          NEW_POOLER_URL: postgresql://postgres.${{ secrets.NEW_DB_REF }}:${{ secrets.NEW_DB_PASSWORD }}@aws-1-ca-central-1.pooler.supabase.com:5432/postgres?sslmode=require
        run: |
          # Pipe everything through ONE psql call with --single-transaction.
          # This keeps a single backend connection through PgBouncer so
          # SET LOCAL session_replication_role=replica actually applies to
          # every COPY statement (session vars don't survive across connections).
          { echo "SET LOCAL session_replication_role = replica;"; cat haccare_public.sql; } \
            | psql "$NEW_POOLER_URL" --single-transaction --echo-errors
          echo "Public data restore complete"

      - name: Apply RLS event trigger migration
        env:
          PGPASSWORD: ${{ secrets.NEW_DB_PASSWORD }}
          NEW_POOLER_URL: postgresql://postgres.${{ secrets.NEW_DB_REF }}:${{ secrets.NEW_DB_PASSWORD }}@aws-1-ca-central-1.pooler.supabase.com:5432/postgres?sslmode=require
        run: |
          psql "$NEW_POOLER_URL" \
            --file=database/migrations/20260507000000_enable_automatic_rls_event_trigger.sql
          echo "RLS event trigger applied"

      - name: Verify row counts
        env:
          PGPASSWORD: ${{ secrets.NEW_DB_PASSWORD }}
          NEW_POOLER_URL: postgresql://postgres.${{ secrets.NEW_DB_REF }}:${{ secrets.NEW_DB_PASSWORD }}@aws-1-ca-central-1.pooler.supabase.com:5432/postgres?sslmode=require
        run: |
          psql "$NEW_POOLER_URL" <<'SQL'
            SELECT relname AS table_name, reltuples::bigint AS approx_row_count
            FROM pg_class c
            JOIN pg_namespace n ON n.oid = c.relnamespace
            WHERE n.nspname = 'public' AND c.relkind = 'r'
            ORDER BY reltuples DESC;
          SQL

      - name: Verify auth users migrated
        env:
          PGPASSWORD: ${{ secrets.NEW_DB_PASSWORD }}
          NEW_POOLER_URL: postgresql://postgres.${{ secrets.NEW_DB_REF }}:${{ secrets.NEW_DB_PASSWORD }}@aws-1-ca-central-1.pooler.supabase.com:5432/postgres?sslmode=require
        run: |
          psql "$NEW_POOLER_URL" -c "SELECT COUNT(*) AS user_count FROM auth.users;"
