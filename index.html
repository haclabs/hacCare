              "acceptedAnswer": {
                "@type": "Answer",
                "text": "hacCare is a high-fidelity simulated Electronic Medical Records (EMR) platform built for healthcare education. It allows nursing students to practice real clinical workflows — including BCMA medication scanning, vital signs charting, lab orders, and shift handover — in a safe, instructor-controlled simulation environment."
              }

              "name": "Which nursing programs use hacCare?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "hacCare is used by Canadian post-secondary healthcare programs including Practical Nursing (PN), Bachelor of Nursing (BN/BNAD), and Simulation Hub programs. It is currently deployed at Lethbridge Polytechnic in Alberta, Canada."
              }
            },
            {
              "@type": "Question",
              "name": "Is hacCare HIPAA and privacy compliant?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. hacCare uses multi-tenant architecture with strict Row-Level Security (RLS) policies to isolate all data between institutions. All patient data in simulations is fictional and no real patient information is ever stored. The platform is designed to meet HIPAA and Canadian PIPEDA privacy requirements."
              }
            },
            {
              "@type": "Question",
              "name": "What is BCMA training and why does it matter?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "BCMA (Barcode Medication Administration) is a patient safety system that requires nurses to scan both the patient wristband and medication barcode before administering drugs, verifying the Five Rights of medication administration. hacCare includes a full BCMA simulation with real barcode scanning so students can practice this critical safety skill before entering clinical placements."
              }
            },
            {
              "@type": "Question",
              "name": "How do instructors manage simulations in hacCare?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Instructors create reusable simulation templates with pre-configured patient scenarios, medications, lab orders, and clinical data. They launch simulations for student groups with one click, monitor progress in real time, and generate automated debrief reports showing each student's clinical documentation activity after the session ends."
              }
            }
